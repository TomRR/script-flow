name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: scriptflow-electron

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: scriptflow-electron/package.json

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('scriptflow-electron/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Format
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build:desktop

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "Missing dist/index.html" && exit 1)
          test -d dist-electron || (echo "Missing dist-electron/" && exit 1)
          grep -qE "contextBridge|exposeInMainWorld" dist-electron/preload.js || (echo "Preload bundle missing expected IPC bridge exports" && exit 1)

  release_smoke:
    name: Release Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: scriptflow-electron
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: scriptflow-electron/package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Exercise release smoke checks
        run: bun run release:smoke
